<!DOCTYPE html><html lang="zh-CN"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="SportRule：运动官方规则说明与多端导航页面。"><base href="/sportRule/"><title><slot name="title" /> | SportRule</title><style>:root{color-scheme:light;--bg: #f8fafc;--surface: rgba(255, 255, 255, .95);--surface-border: #e5e7eb;--text: #111827;--muted: #4b5563;--primary: #2563eb;--primary-strong: #1d4ed8;--radius: 1rem}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:linear-gradient(180deg,#f8fafc,#e2e8f0);color:var(--text)}a{color:var(--primary)}a:hover{text-decoration:underline}button{font:inherit;cursor:pointer}.container{max-width:1080px;margin:0 auto;padding:1.5rem 1rem 3rem}.navbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem;background:#ffffffeb;border-bottom:1px solid #d1d5db;position:sticky;top:0;z-index:10;backdrop-filter:blur(14px)}.navbar__brand{font-weight:700;font-size:1.15rem}.navbar__menu{display:flex;align-items:center}.navbar__toggle{display:none;border:1px solid #cbd5e1;border-radius:.75rem;padding:.65rem .9rem;background:#fff;color:var(--text)}.navbar__list{display:flex;gap:1rem;list-style:none;margin:0;padding:0}.navbar__item{margin:0}.navbar__link{font-weight:600;color:var(--text);text-decoration:none}.navbar__link:hover,.navbar__link:focus-visible{color:var(--primary-strong)}.hero{margin-bottom:1.5rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1.25rem}.sport-card,.card{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--radius);box-shadow:0 10px 30px #0f172a14;padding:1.75rem}.sport-card__icon{font-size:2rem;margin-bottom:.8rem}.rule-item+.rule-item{margin-top:1.25rem}.sport-detail__header{display:grid;grid-template-columns:auto 1fr;gap:1rem;align-items:center;margin-bottom:1.5r </style></head> <body> <nav class="navbar"> <div class="navbar__brand">SportRule</div> <details class="navbar__menu"> <summary class="navbar__toggle" aria-label="切换导航">☰</summary> <ul class="navbar__list"> <li class="navbar__item"> <a class="navbar__link" href="/sportRule/">主页</a> </li><li class="navbar__item"> <a class="navbar__link" href="/sportRule/sports">运动规则</a> </li><li class="navbar__item"> <a class="navbar__link" href="/sportRule/about">关于</a> </li> </ul> </details> </nav> <main class="container">   <section class="card"> <div class="sport-detail__header"> <div class="sport-detail__icon">🏀</div> <div> <h1>篮球 规则</h1> <p>比赛分为四节，每节12分钟（国际规则为10分钟），球员通过投篮得分并遵守犯规限制。</p> </div> </div> <div class="sport-detail__rules"> <article class="rule-item" key="得分方式"> <h3>得分方式</h3> <p>篮内投篮得2分，三分线外投篮得3分，罚球命中得1分。</p> </article><article class="rule-item" key="犯规与违例"> <h3>犯规与违例</h3> <p>运动员不得推人、拉人或非法阻挡，否则判罚罚球或球权转换。</p> </article><article class="rule-item" key="运球规则"> <h3>运球规则</h3> <p>持球运动员必须运球前进，不能双手持球后再次运球或走步。</p> </article> </div> <a class="button button--secondary" href="../">返回运动导航</a> </section> </main> </body></html>
