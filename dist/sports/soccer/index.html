<!DOCTYPE html><html lang="zh-CN"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="SportRule：运动官方规则说明与多端导航页面。"><base href="/sportRule/"><title>SportRule</title><style>:root{color-scheme:light;--bg: #f8fafc;--surface: rgba(255, 255, 255, .95);--surface-border: #e5e7eb;--text: #111827;--muted: #4b5563;--primary: #2563eb;--primary-strong: #1d4ed8;--radius: 1rem}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:linear-gradient(180deg,#f8fafc,#e2e8f0);color:var(--text)}a{color:var(--primary)}a:hover{text-decoration:underline}button{font:inherit;cursor:pointer}.container{max-width:1080px;margin:0 auto;padding:1.5rem 1rem 3rem}.navbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem;background:#ffffffeb;border-bottom:1px solid #d1d5db;position:sticky;top:0;z-index:10;backdrop-filter:blur(14px)}.navbar__brand{font-weight:700;font-size:1.15rem}.navbar__menu{display:flex;align-items:center}.navbar__toggle{display:none;border:1px solid #cbd5e1;border-radius:.75rem;padding:.65rem .9rem;background:#fff;color:var(--text)}.navbar__list{display:flex;gap:1rem;list-style:none;margin:0;padding:0}.navbar__item{margin:0}.navbar__link{font-weight:600;color:var(--text);text-decoration:none}.navbar__link:hover,.navbar__link:focus-visible{color:var(--primary-strong)}.hero{margin-bottom:1.5rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1.25rem}.sport-card,.card{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--radius);box-shadow:0 10px 30px #0f172a14;padding:1.75rem}.sport-card__icon{font-size:2rem;margin-bottom:.8rem}.rule-item+.rule-item{margin-top:1.25rem}.sport-detail__header{display:grid;grid-template-columns:auto 1fr;gap:1rem;align-items:center;margin-bottom:1.5rem}.sport-detail__icon{font-size:3rem}.button{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1rem;padding:.85rem 1.3rem;border-radius:999px;border:none;background:var(--primary);color:#fff;text-decoration:none;font-weight:700}.button:hover,.button:focus-visible{background:var(--primary-strong)}.button--secondary{background:#fff;color:var(--text);border:1px solid #cbd5e1}.button--secondary:hover,.button--secondary:focus-visible{background:#f8fafc}@media (max-width: 860px){.grid{grid-template-columns:1fr}}@media (max-width: 720px){.container{padding:1rem .75rem 2rem}.navbar{flex-wrap:wrap;align-items:stretch}.navbar__toggle{display:inline-flex;margin-left:auto}.navbar__list{display:none;flex-direction:column;gap:.5rem;padding-top:.75rem;width:100%}.navbar__menu[open] .navbar__list{display:flex}.navbar__menu{width:100%}.navbar__list{border-top:1px solid #e2e8f0;padding-top:.75rem}}.rule-toggle{display:flex;justify-content:flex-end;margin-bottom:1rem}.rules-brief .brief-item h3{margin:0;font-size:1.05rem}.rules-detailed .rule-item h3{margin:0}.brief-item{padding:.5rem 0;border-bottom:1px dashed rgba(0,0,0,.05)}@media (max-width: 720px){.rule-toggle{justify-content:stretch}}
</style></head> <body> <nav class="navbar"> <div class="navbar__brand">SportRule</div> <details class="navbar__menu"> <summary class="navbar__toggle" aria-label="切换导航">☰</summary> <ul class="navbar__list"> <li class="navbar__item"> <a class="navbar__link" href="/sportRule/">主页</a> </li><li class="navbar__item"> <a class="navbar__link" href="/sportRule/sports">运动规则</a> </li><li class="navbar__item"> <a class="navbar__link" href="/sportRule/about">关于</a> </li> </ul> </details> </nav> <main class="container">   <section class="card"> <div class="sport-detail__header"> <div class="sport-detail__icon">⚽</div> <div> <h1>足球 规则</h1> <p>比赛由两队各11人进行，目标是把球送入对方球门，同时遵循越位和犯规规则。</p> </div> </div> <div class="rule-toggle"> <button id="toggleView" class="button button--secondary" type="button" aria-pressed="false">显示详细规则</button> </div> <div class="sport-detail__rules"> <div class="rules-brief"> <article class="rule-item brief-item" key="进球判定"> <h3>进球判定</h3> </article><article class="rule-item brief-item" key="越位规则"> <h3>越位规则</h3> </article><article class="rule-item brief-item" key="直接任意球"> <h3>直接任意球</h3> </article> </div> <div class="rules-detailed" hidden> <article class="rule-item" key="进球判定"> <h3>进球判定</h3> <p>当整个球体完全越过球门线即为进球，裁判根据球门线技术辅助判定。</p> </article><article class="rule-item" key="越位规则"> <h3>越位规则</h3> <p>进攻队员传球瞬间比倒数第二名防守队员更靠近球门线即判越位。</p> </article><article class="rule-item" key="直接任意球"> <h3>直接任意球</h3> <p>防守方犯规后，攻击方可直接射门得分或传球。</p> </article> </div> </div> <a class="button button--secondary" href="/sportRule/">返回运动导航</a> <script type="module">
        const btn = document.getElementById('toggleView');
        const brief = document.querySelector('.rules-brief');
        const detailed = document.querySelector('.rules-detailed');
        if (btn && brief && detailed) {
          btn.addEventListener('click', () => {
            const pressed = btn.getAttribute('aria-pressed') === 'true';
            btn.setAttribute('aria-pressed', String(!pressed));
            if (pressed) {
              // switch to brief
              detailed.hidden = true;
              brief.hidden = false;
              btn.textContent = '显示详细规则';
            } else {
              // switch to detailed
              brief.hidden = true;
              detailed.hidden = false;
              btn.textContent = '显示简要规则';
            }
          });
        }
      </script> </section> </main> </body></html>
